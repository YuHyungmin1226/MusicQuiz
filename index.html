<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음악 이론 퀴즈 — 중학교 음악 교육과정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f5;--bg-tertiary:#efefef;
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#9b9b9b;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.22);
  --radius-md:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1e1e1e;--bg-secondary:#2a2a2a;--bg-tertiary:#141414;
    --text-primary:#f0f0f0;--text-secondary:#aaaaaa;--text-tertiary:#666666;
    --border-tertiary:rgba(255,255,255,0.1);--border-secondary:rgba(255,255,255,0.2);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);min-height:100vh;color:var(--text-primary)}
.app{max-width:680px;margin:0 auto;padding:1rem}
.screen{display:none;animation:fadeIn 0.3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{text-align:center;padding:2rem 0 1.5rem}
.hero-icon{font-size:48px;margin-bottom:0.75rem}
.hero h1{font-size:22px;font-weight:500;color:var(--text-primary);margin-bottom:0.5rem}
.hero p{font-size:14px;color:var(--text-secondary);line-height:1.6}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:1.25rem 0}
.stat-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:0.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:var(--text-primary)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:2px}
.section-title{font-size:13px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin:1.5rem 0 0.75rem}
.category-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cat-card{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem 1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.cat-card:hover{border-color:var(--border-secondary);background:var(--bg-secondary)}
.cat-card:active{transform:scale(0.98)}
.cat-accent{width:3px;height:100%;position:absolute;left:0;top:0;border-radius:4px 0 0 4px}
.cat-icon{font-size:22px;margin-bottom:6px}
.cat-title{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.cat-sub{font-size:12px;color:var(--text-secondary)}
.cat-badge{font-size:11px;padding:2px 7px;border-radius:9999px;position:absolute;top:10px;right:10px;font-weight:500}
.badge-done{background:#EAF3DE;color:#3B6D11}
.badge-new{background:#E6F1FB;color:#185FA5}
.quiz-header{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.quiz-category{font-size:13px;color:var(--text-secondary)}
.quiz-progress-text{font-size:13px;color:var(--text-secondary)}
.progress-bar{height:5px;background:var(--bg-secondary);border-radius:9999px;overflow:hidden}
.progress-fill{height:100%;border-radius:9999px;transition:width 0.4s ease;background:#6C5CE7}
.question-card{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.q-num{font-size:12px;color:var(--text-tertiary);margin-bottom:0.5rem}
.q-text{font-size:16px;font-weight:500;color:var(--text-primary);line-height:1.6;margin-bottom:0.5rem}
.q-image{text-align:center;padding:0.75rem;font-size:28px;background:var(--bg-secondary);border-radius:var(--radius-md);margin:0.75rem 0}
.options-grid{display:grid;gap:8px;margin-top:1rem}
.opt-btn{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-md);padding:0.75rem 1rem;text-align:left;cursor:pointer;font-size:14px;color:var(--text-primary);transition:all 0.15s;display:flex;align-items:center;gap:0.75rem;font-family:inherit;width:100%}
.opt-btn:hover:not(:disabled){background:var(--bg-secondary);border-color:var(--border-secondary)}
.opt-label{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border-secondary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:var(--text-secondary)}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt-btn.correct .opt-label{background:#639922;color:#fff;border-color:#639922}
.opt-btn.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313}
.opt-btn.wrong .opt-label{background:#E24B4A;color:#fff;border-color:#E24B4A}
.opt-btn:disabled{cursor:default}
.feedback-bar{border-radius:var(--radius-md);padding:0.875rem 1rem;margin-bottom:1rem;display:none;align-items:center;gap:0.75rem}
.feedback-bar.show{display:flex}
.feedback-bar.ok{background:#EAF3DE;border:0.5px solid #97C459}
.feedback-bar.ng{background:#FCEBEB;border:0.5px solid #F09595}
.feedback-icon{font-size:18px;flex-shrink:0}
.feedback-text{font-size:14px;font-weight:500;flex:1}
.feedback-text.ok{color:#27500A}
.feedback-text.ng{color:#501313}
.feedback-explain{font-size:13px;color:var(--text-secondary);margin-top:2px}
.next-btn{width:100%;background:#6C5CE7;color:#fff;border:none;border-radius:var(--radius-md);padding:0.875rem;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.15s;font-family:inherit}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.99)}
.result-card{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:2rem;text-align:center;margin-bottom:1rem}
.score-ring{width:100px;height:100px;margin:0 auto 1rem;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:500;color:var(--text-primary)}
.result-title{font-size:20px;font-weight:500;margin-bottom:0.25rem;color:var(--text-primary)}
.result-sub{font-size:14px;color:var(--text-secondary)}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1.25rem}
.r-stat{background:var(--bg-secondary);border-radius:var(--radius-md);padding:0.625rem;text-align:center}
.r-stat-n{font-size:18px;font-weight:500;color:var(--text-primary)}
.r-stat-l{font-size:11px;color:var(--text-secondary)}
.review-item{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-md);padding:0.875rem;margin-bottom:8px;display:flex;gap:0.75rem;align-items:flex-start}
.review-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.review-q{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.review-a{font-size:12px;color:var(--text-secondary)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0.75rem}
.btn-sec{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-md);padding:0.75rem;font-size:14px;cursor:pointer;color:var(--text-primary);font-family:inherit;transition:background 0.15s}
.btn-sec:hover{background:var(--bg-secondary)}
.btn-pri{background:#6C5CE7;border:none;border-radius:var(--radius-md);padding:0.75rem;font-size:14px;font-weight:500;cursor:pointer;color:#fff;font-family:inherit;transition:opacity 0.15s}
.btn-pri:hover{opacity:0.9}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;padding:0;font-family:inherit;display:flex;align-items:center;gap:4px;margin-bottom:1rem}
.back-btn:hover{color:var(--text-primary)}
</style>
</head>
<body>
<div class="app">

<div class="screen active" id="home-screen">
  <div class="hero">
    <div class="hero-icon">🎵</div>
    <h1>음악 이론 퀴즈</h1>
    <p>중학교 음악 교육과정 기반 · 7개 영역 · 140개 문제</p>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="gs-total">0</div>
      <div class="stat-label">총 풀이</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="gs-correct">0%</div>
      <div class="stat-label">정답률</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="gs-streak">0</div>
      <div class="stat-label">최고 연속</div>
    </div>
  </div>
  <div class="section-title">학습 영역 선택</div>
  <div class="category-grid" id="cat-grid"></div>
</div>

<div class="screen" id="quiz-screen">
  <button class="back-btn" onclick="goHome()">← 홈으로</button>
  <div class="quiz-header">
    <div class="quiz-meta">
      <span class="quiz-category" id="q-cat-name"></span>
      <span class="quiz-progress-text" id="q-progress"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="q-prog-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="question-card">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-image" id="q-image" style="display:none"></div>
    <div class="options-grid" id="q-options"></div>
  </div>
  <div class="feedback-bar" id="feedback">
    <div class="feedback-icon" id="fb-icon"></div>
    <div>
      <div class="feedback-text" id="fb-text"></div>
      <div class="feedback-explain" id="fb-explain"></div>
    </div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">다음 문제 →</button>
</div>

<div class="screen" id="result-screen">
  <button class="back-btn" onclick="goHome()">← 홈으로</button>
  <div class="result-card">
    <div class="score-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg-secondary)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke-width="8" stroke-linecap="round" id="score-arc" stroke="#6C5CE7" stroke-dasharray="0 264"/>
      </svg>
      <div class="score-center" id="score-pct"></div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-n" id="r-correct" style="color:#639922">0</div><div class="r-stat-l">정답</div></div>
      <div class="r-stat"><div class="r-stat-n" id="r-wrong" style="color:#E24B4A">0</div><div class="r-stat-l">오답</div></div>
      <div class="r-stat"><div class="r-stat-n" id="r-time">0s</div><div class="r-stat-l">소요 시간</div></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-sec" onclick="retryQuiz()">다시 풀기</button>
    <button class="btn-pri" onclick="goHome()">다른 영역 →</button>
  </div>
  <div class="section-title">문제 풀이 복습</div>
  <div id="review-list"></div>
</div>

</div>
<script>
const CATS=[
  {id:'note',title:'음표와 쉼표',sub:'음표 종류·음가·점음표',icon:'♩',accent:'#6C5CE7'},
  {id:'scale',title:'음계와 조성',sub:'장음계·단음계·조표',icon:'🎼',accent:'#00B894'},
  {id:'rhythm',title:'박자와 리듬',sub:'박자표·박·리듬꼴',icon:'🥁',accent:'#E17055'},
  {id:'mark',title:'악상기호',sub:'세기·빠르기·나타냄말',icon:'𝆒',accent:'#0984E3'},
  {id:'chord',title:'화음과 음정',sub:'음정·장단화음·으뜸화음',icon:'🎹',accent:'#c0901e'},
  {id:'inst',title:'악기',sub:'관현악기·국악기·분류',icon:'🎻',accent:'#E84393'},
  {id:'form',title:'음악 형식',sub:'형식·악곡·음악사',icon:'📜',accent:'#00CEC9'},
];

const QUESTIONS={
note:[
  {q:'온음표의 박자 수는?',opts:['1박','2박','3박','4박'],ans:3,explain:'온음표(𝅝)는 기본 단위로 4박을 가집니다.'},
  {q:'2분음표의 박자 수는?',opts:['1박','2박','3박','4박'],ans:1,explain:'2분음표(𝅗𝅥)는 온음표의 절반인 2박입니다.'},
  {q:'4분음표의 박자 수는?',opts:['1박','2박','3박','4박'],ans:0,explain:'4분음표(♩)는 가장 기본적인 음표로 1박을 나타냅니다.'},
  {q:'8분음표(♪)는 몇 박인가요?',opts:['½박','1박','2박','4박'],ans:0,explain:'8분음표는 4분음표의 절반인 ½박입니다.'},
  {q:'점2분음표의 박자 수는?',opts:['2박','2.5박','3박','3.5박'],ans:2,explain:'점음표는 원래 음표의 1.5배이므로, 점2분음표 = 2 × 1.5 = 3박입니다.'},
  {q:'4분쉼표가 쉬는 시간은?',opts:['½박','1박','2박','4박'],ans:1,explain:'쉼표는 해당 음표와 같은 길이만큼 소리를 내지 않습니다. 4분쉼표 = 1박.'},
  {q:'16분음표 2개는 어느 음표와 같은가요?',opts:['온음표','2분음표','4분음표','8분음표'],ans:3,explain:'16분음표 = 8분음표의 절반이므로, 16분음표 2개 = 8분음표 1개.'},
  {q:'온음표 쉼표의 모양 설명으로 맞는 것은?',opts:['선 위에 매달린 직사각형','선 아래에 붙은 직사각형','빈 마름모','채워진 마름모'],ans:1,explain:'온음표 쉼표는 4번 선 아래에 붙은 납작한 직사각형으로 표기됩니다.'},
  {q:'점4분음표의 박자 수는?',opts:['1박','1.5박','2박','2.5박'],ans:1,explain:'점음표는 원래 음표의 1.5배입니다. 점4분음표 = 1 × 1.5 = 1.5박.'},
  {q:'다음 중 틀린 것은?',opts:['♩ = 1박','𝅗𝅥 = 2박','𝅝 = 4박','♪ = 1박'],ans:3,explain:'8분음표(♪)는 ½박입니다. 1박은 4분음표(♩)입니다.'},
  {q:'온음표 4개는 몇 박인가요?',opts:['4박','8박','16박','12박'],ans:2,explain:'온음표 1개 = 4박이므로, 4개 × 4박 = 16박입니다.'},
  {q:'겹점음표는 원래 음표의 몇 배인가요?',opts:['1.5배','1.75배','2배','2.5배'],ans:1,explain:'겹점음표는 원래 음표 + 절반 + 1/4, 즉 1.75배입니다.'},
  {q:'당김음(Syncopation)이란?',opts:['여린박이 강박처럼 강조됨','강박에 음이 오는 것','빠르게 연주하는 기법','쉼표가 많은 리듬'],ans:0,explain:'당김음은 여린박에 시작한 음이 강박까지 이어져 강박처럼 들리는 효과입니다.'},
  {q:'4분음표 4개로 만들 수 있는 박자는?',opts:['2/4박자','3/4박자','4/4박자','6/8박자'],ans:2,explain:'4/4박자는 한 마디에 4분음표가 4개 들어가는 박자입니다.'},
  {q:'2분음표 쉼표의 모양은?',opts:['선 아래에 붙음','선 위에 매달림','삐죽한 모양','와구리 모양'],ans:1,explain:'2분음표 쉼표는 3번 선 위에 올려놓은 납작한 직사각형으로, 온음표 쉼표와 반대 방향입니다.'},
  {q:'셋잇단음표(Triplet)에서 3개의 음표가 차지하는 시간은?',opts:['같은 종류 1개 길이','같은 종류 2개 길이','같은 종류 3개 길이','같은 종류 4개 길이'],ans:1,explain:'8분음표 셋잇단음표 3개는 8분음표 2개(= 4분음표 1박)와 같은 시간을 차지합니다.'},
  {q:'온음표 쉼표와 2분음표 쉼표를 구별하는 방법은?',opts:['크기가 다르다','위치가 반대이다','색이 다르다','획수가 다르다'],ans:1,explain:'온음표 쉼표는 선 아래에, 2분음표 쉼표는 선 위에 붙습니다.'},
  {q:'붙임줄(Tie)의 역할은?',opts:['음을 꾸미는 것','같은 음을 연결해 길이를 늘리는 것','빠르기를 표시','음의 세기를 표시'],ans:1,explain:'붙임줄은 같은 높이의 음표 두 개를 연결하여 하나의 긴 음으로 연주하게 합니다.'},
  {q:'이음줄(Slur)의 역할은?',opts:['음을 부드럽게 연결','음의 길이를 연장','음의 세기 증가','빠르게 연주'],ans:0,explain:'이음줄은 서로 다른 높이의 음표를 부드럽게(레가토) 연결하는 기호입니다.'},
  {q:'한 마디에 4분음표 4박이 들어가는 박자 표기는?',opts:['2/4','3/4','4/4','6/8'],ans:2,explain:'4/4박자: 분모 4는 4분음표, 분자 4는 한 마디에 4박임을 나타냅니다.'},
],
scale:[
  {q:'C장조의 음계 순서는?',opts:['도레미파솔라시도','도레미♭파솔라시도','도레♭미파솔라시도','도레미파♭솔라시도'],ans:0,explain:'C장조는 검은 건반 없이 흰 건반만으로 이루어진 기본 장음계입니다.'},
  {q:'장음계의 온음·반음 구조는?',opts:['온온반온온온반','온반온온반온온','반온온온반온온','온온온반온온반'],ans:0,explain:'장음계의 구조는 온-온-반-온-온-온-반 순서입니다 (W-W-H-W-W-W-H).'},
  {q:'G장조의 조표는?',opts:['♭ 1개','♯ 1개','♭ 2개','♯ 2개'],ans:1,explain:'G장조는 F♯ 하나를 조표로 가집니다.'},

  {q:'국악의 "산조"는 어떤 형식인가요?',opts:['독주 기악곡','합창곡','무용음악','의식음악'],ans:0,explain:'산조는 독주 악기와 장구 반주로 이루어진 기악 독주 형식으로, 빠르기가 점차 빨라집니다.'},
  {q:'"가곡(Lied)"이 발전한 시대는?',opts:['바로크','고전주의','낭만주의','현대'],ans:2,explain:'독일 가곡(Lied)은 슈베르트·슈만·브람스 등 낭만주의 시대에 크게 발전했습니다.'},
  {q:'오페라(Opera)의 구성 요소가 아닌 것은?',opts:['아리아(Aria)','레치타티보','오케스트라','소나타 형식'],ans:3,explain:'오페라는 아리아(독창), 레치타티보(낭송), 합창, 오케스트라로 구성된 종합 예술입니다.'},
  {q:'세레나데(Serenade)는 원래 어떤 목적의 음악인가요?',opts:['아침에 연주하는 음악','저녁에 연인에게 바치는 음악','신에게 바치는 음악','전쟁 음악'],ans:1,explain:'세레나데는 원래 저녁에 연인의 창가에서 연주하는 야외 소야곡(小夜曲)입니다.'},
  {q:'"절대음악"과 "표제음악"의 차이는?',opts:['절대음악=특정 내용 없음, 표제음악=이야기/그림 묘사','절대음악=느림, 표제음악=빠름','절대음악=성악, 표제음악=기악','악기 구성이 다름'],ans:0,explain:'절대음악은 순수 음으로만 구성되고, 표제음악은 이야기·자연·그림 등을 묘사합니다.'},
],
};

let state={screen:'home',cat:null,qs:[],cur:0,score:0,answers:[],startTime:0,streak:0};
let storage={total:0,correct:0,maxStreak:0,catDone:{}};

function loadStorage(){
  try{const s=JSON.parse(localStorage.getItem('mqz')||'{}');
  storage={total:s.total||0,correct:s.correct||0,maxStreak:s.maxStreak||0,catDone:s.catDone||{}};}
  catch(e){}
}
function saveStorage(){try{localStorage.setItem('mqz',JSON.stringify(storage));}catch(e){}}

function updateHomeStats(){
  const pct=storage.total>0?Math.round(storage.correct/storage.total*100):0;
  document.getElementById('gs-total').textContent=storage.total;
  document.getElementById('gs-correct').textContent=pct+'%';
  document.getElementById('gs-streak').textContent=storage.maxStreak;
}

function buildCategoryGrid(){
  const g=document.getElementById('cat-grid');
  g.innerHTML='';
  CATS.forEach(c=>{
    const done=storage.catDone[c.id];
    const div=document.createElement('div');
    div.className='cat-card';
    div.innerHTML=`<div class="cat-accent" style="background:${c.accent}"></div>
<div class="cat-icon">${c.icon}</div>
<div class="cat-title">${c.title}</div>
<div class="cat-sub">${c.sub}</div>
${done!==undefined?`<span class="cat-badge badge-done">완료 ${done}%</span>`:`<span class="cat-badge badge-new">NEW</span>`}`;
    div.onclick=()=>startQuiz(c.id);
    g.appendChild(div);
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){
  showScreen('home-screen');
  updateHomeStats();
  buildCategoryGrid();
}

function shuffle(arr){return arr.slice().sort(()=>Math.random()-0.5)}

function startQuiz(catId){
  const cat=CATS.find(c=>c.id===catId);
  const allQ=QUESTIONS[catId];
  const qs=shuffle(allQ).slice(0,10).map(q=>({...q}));
  state={screen:'quiz',cat,qs,cur:0,score:0,answers:[],startTime:Date.now(),streak:0};
  document.getElementById('q-cat-name').textContent=cat.title;
  document.querySelector('.progress-fill').style.background=cat.accent;
  renderQuestion();
  showScreen('quiz-screen');
}

function renderQuestion(){
  const q=state.qs[state.cur];
  const n=state.cur+1;
  const total=state.qs.length;
  document.getElementById('q-num').textContent=`문제 ${n}`;
  document.getElementById('q-progress').textContent=`${n} / ${total}`;
  document.getElementById('q-prog-fill').style.width=`${(n-1)/total*100}%`;
  document.getElementById('q-text').textContent=q.q;
  const img=document.getElementById('q-image');
  if(q.img){img.textContent=q.img;img.style.display='block';}else{img.style.display='none';}
  const opts=document.getElementById('q-options');
  const labels=['A','B','C','D'];
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span><span>${o}</span>`;
    btn.onclick=()=>selectAnswer(i,btn);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback-bar';
  document.getElementById('next-btn').style.display='none';
}

function selectAnswer(idx,btn){
  const q=state.qs[state.cur];
  const correct=idx===q.ans;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[q.ans].classList.add('correct');
  if(!correct)btn.classList.add('wrong');
  const fb=document.getElementById('feedback');
  const fi=document.getElementById('fb-icon');
  const ft=document.getElementById('fb-text');
  const fe=document.getElementById('fb-explain');
  if(correct){
    state.score++;state.streak++;
    fi.textContent='✓';ft.textContent='정답입니다!';ft.className='feedback-text ok';fb.className='feedback-bar show ok';
  }else{
    state.streak=0;
    fi.textContent='✗';ft.textContent=`오답. 정답: ${q.opts[q.ans]}`;ft.className='feedback-text ng';fb.className='feedback-bar show ng';
  }
  fe.textContent=q.explain||'';
  state.answers.push({q:q.q,opts:q.opts,ans:q.ans,chosen:idx,correct,explain:q.explain||''});
  document.getElementById('next-btn').style.display='block';
  document.getElementById('q-prog-fill').style.width=`${(state.cur+1)/state.qs.length*100}%`;
}

function nextQuestion(){
  state.cur++;
  if(state.cur>=state.qs.length){showResult();}else{renderQuestion();}
}

function showResult(){
  const elapsed=Math.round((Date.now()-state.startTime)/1000);
  const pct=Math.round(state.score/state.qs.length*100);
  storage.total+=state.qs.length;
  storage.correct+=state.score;
  if(state.streak>storage.maxStreak)storage.maxStreak=state.streak;
  storage.catDone[state.cat.id]=pct;
  saveStorage();
  const arc=document.getElementById('score-arc');
  const circ=2*Math.PI*42;
  arc.setAttribute('stroke-dasharray',`${circ*pct/100} ${circ}`);
  arc.setAttribute('stroke',pct>=80?'#639922':pct>=60?'#BA7517':'#E24B4A');
  document.getElementById('score-pct').textContent=pct+'%';
  const msgs=pct>=90?['완벽해요!','음악 천재 🎵']:pct>=70?['잘했어요!','꾸준히 공부해요']:pct>=50?['절반 이상!','복습이 필요해요']:['더 노력해요','열심히 공부해봐요'];
  document.getElementById('result-title').textContent=msgs[0];
  document.getElementById('result-sub').textContent=`${state.score}/${state.qs.length} 정답 · ${msgs[1]}`;
  document.getElementById('r-correct').textContent=state.score;
  document.getElementById('r-wrong').textContent=state.qs.length-state.score;
  document.getElementById('r-time').textContent=elapsed+'s';
  const rl=document.getElementById('review-list');
  rl.innerHTML='';
  state.answers.forEach((a,i)=>{
    const div=document.createElement('div');
    div.className='review-item';
    div.innerHTML=`<div class="review-dot" style="background:${a.correct?'#639922':'#E24B4A'}"></div>
<div>
<div class="review-q">${i+1}. ${a.q}</div>
<div class="review-a">${a.correct?'✓ 정답':'✗ 내 답: '+a.opts[a.chosen]+' · 정답: '+a.opts[a.ans]}</div>
<div class="review-a" style="margin-top:2px;opacity:0.75">${a.explain}</div>
</div>`;
    rl.appendChild(div);
  });
  showScreen('result-screen');
}

function retryQuiz(){startQuiz(state.cat.id);}

loadStorage();
updateHomeStats();
buildCategoryGrid();
</script>
</body>
</html>
